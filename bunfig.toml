[test]
# Default: fail any test that runs longer than 10s. Slow tests must pass an explicit timeout (e.g. it("...", async () => {}, 30000)).
timeout = 10000
# Integration test files run sequentially. In CI, use `bun test __tests__/integration --concurrency 4` for limited parallelism.
# Unit tests in __tests__/db, domain, export, plan-import remain sequential.
# e2e tests run sequentially: tests within core-flow.test.ts share a single tempDir/dolt repo
# and have ordered dependencies (planId, task1Id etc set by earlier tests used by later ones).
# See https://bun.com/docs/test#concurrent-test-execution
